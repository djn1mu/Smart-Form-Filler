<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root { --primary: #2563eb; --primary-hover: #1d4ed8; --success: #10b981; --success-hover: #059669; --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg); color: var(--text); }
    
    header { padding: 12px 16px; background: white; border-bottom: 1px solid var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 8px; }
    header h3 { margin: 0; font-size: 16px; font-weight: 600; color: #1e293b; }
    .header-actions { display: flex; gap: 6px; }
    .icon-btn { background: transparent; color: #64748b; border: 1px solid transparent; padding: 4px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; }
    .icon-btn:hover { background: #f1f5f9; color: var(--text); border-color: var(--border); }
    
    .container { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 16px; overflow: hidden; }
    
    /* Settings Panel */
    details { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
    details summary { cursor: pointer; font-weight: 500; font-size: 14px; outline: none; list-style: none; display: flex; justify-content: space-between; align-items: center; color: #475569; }
    details summary::-webkit-details-marker { display: none; }
    details summary::after { content: '▼'; font-size: 10px; transition: transform 0.2s; }
    details[open] summary::after { transform: rotate(180deg); }
    
    .settings-content { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; max-height: 35vh; overflow-y: auto; padding-right: 4px; }
    label { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: -6px; }
    
    input, textarea { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; transition: all 0.2s; font-family: inherit; background: #fff; }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    textarea { resize: vertical; min-height: 80px; }
    
    /* Buttons */
    button { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    button:hover:not(:disabled) { background: var(--primary-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-success { background: var(--success); }
    .btn-success:hover:not(:disabled) { background: var(--success-hover); }
    .btn-saved { background: var(--success) !important; color: white !important; }
    
    /* Chat Area */
    #chat-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-bottom: 10px; }
    .chat-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
    .user-msg { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .ai-msg { align-self: flex-start; background: white; color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    
    /* Action Footer */
    .controls-wrapper { background: white; border-top: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .chat-input-row { display: flex; gap: 8px; }
    .chat-input-row input { flex: 1; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      ✨ <h3>AI Form Assistant</h3>
    </div>
    <div class="header-actions">
      <button id="clearChatBtn" class="icon-btn" title="Clear Chat History">🗑️</button>
      <button id="closePanelBtn" class="icon-btn" title="Close Panel">✖️</button>
    </div>
  </header>
  
  <div class="container">
    <details id="settingsDetails">
      <summary>⚙️ Settings & Profile</summary>
      <div class="settings-content">
        <label>API Endpoint</label>
        <input type="text" id="apiEndpoint" value="https://api.openai.com/v1/chat/completions">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">
        <label>Model Name</label>
        <input type="text" id="modelName" value="gpt-4o-mini">
        <label>Your Profile (Bio/Info)</label>
        <textarea id="userProfile" placeholder="Enter your name, email, phone, work history, etc."></textarea>
        <button id="saveBtn">Save Settings</button>
      </div>
    </details>

    <div id="chat-container">
      <div class="chat-msg ai-msg">👋 Hi! I'm your AI assistant. Click "Analyze & Fill" below to scan the page, or ask me anything!</div>
    </div>
  </div>

  <div class="controls-wrapper">
    <div class="chat-input-row">
      <input type="text" id="userInput" placeholder="E.g., Use my business email...">
      <button id="sendBtn">▶ Send</button>
    </div>
    <button id="scanBtn" class="btn-success">🚀 Analyze & Fill Form</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
